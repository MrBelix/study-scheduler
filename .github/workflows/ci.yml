name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore StudyScheduler.slnx

      - name: Build
        run: dotnet build StudyScheduler.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test StudyScheduler.slnx --configuration Release --no-build --verbosity normal
