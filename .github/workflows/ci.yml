name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore StudyScheduler.slnx

      - name: Build
        run: dotnet build StudyScheduler.slnx --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test tests/StudyScheduler.Tests/StudyScheduler.Tests.csproj --configuration Release --no-build --verbosity normal

  integration:
    name: Integration tests (Aspire + SQL Server)
    runs-on: ubuntu-latest # ubuntu runners ship a running Docker daemon that Aspire/Testcontainers use
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Integration tests
        run: dotnet test tests/StudyScheduler.IntegrationTests/StudyScheduler.IntegrationTests.csproj --configuration Release --verbosity normal
