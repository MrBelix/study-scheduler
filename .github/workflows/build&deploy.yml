# Build, test and deploy the API to Azure App Service.
# Flow: unit + integration tests → publish API → deploy (deploy only on main, after tests pass).
name: Build, test and deploy - StudyScheduler

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test tests/StudyScheduler.Tests/StudyScheduler.Tests.csproj --configuration Release

  integration:
    name: Integration tests (Aspire + SQL Server)
    runs-on: ubuntu-latest # ubuntu runners ship a running Docker daemon that Aspire uses
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test tests/StudyScheduler.IntegrationTests/StudyScheduler.IntegrationTests.csproj --configuration Release

  build:
    name: Publish API
    needs: [unit, integration]
    if: github.event_name != 'pull_request' # don't publish/deploy for PRs, only after they merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish API
        run: dotnet publish src/StudyScheduler.API/StudyScheduler.API.csproj -c Release -o ./publish
      - uses: actions/upload-artifact@v4
        with:
          name: api
          path: ./publish

  deploy:
    name: Deploy to Azure App Service
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC azure
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api
          path: ./publish
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_57ED71C40B6D475AAB560B7B42ACEDC8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6048332E9E9B45CDA3E9CFBC46EBEB80 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E2CD1F1110E54A32B82A53FD76F938C2 }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'StudyScheduler'
          slot-name: 'Production'
          package: ./publish
